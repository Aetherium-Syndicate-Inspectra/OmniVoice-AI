name: CD

on:
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]

permissions:
  contents: read

jobs:
  release:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: 20.x
          cache: npm

      - name: Download CI package artifact
        uses: actions/download-artifact@v4
        with:
          name: npm-package
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: dist

      - name: Extract package artifact
        run: |
          mkdir -p package
          tar -xzf dist/*.tgz -C package

      - name: Trigger deploy webhook (optional)
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
        run: |
          if [ -z "$DEPLOY_WEBHOOK_URL" ]; then
            echo "DEPLOY_WEBHOOK_URL is not configured; skipping deployment trigger."
            exit 0
          fi

          curl --fail --show-error --silent \
            --request POST \
            --header 'Content-Type: application/json' \
            --data "{\"repository\":\"${{ github.repository }}\",\"sha\":\"${{ github.event.workflow_run.head_sha }}\"}" \
            "$DEPLOY_WEBHOOK_URL"
