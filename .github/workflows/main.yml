name: main

on:
  push:
    branches:
      - main
      - master
      - develop
      - 'feature/**'
      - 'hotfix/**'
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    name: Validate, test, and smoke-check
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------
      # Python Setup
      # ------------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ------------------------
      # Node Setup
      # ------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack
        run: corepack enable

      # ------------------------
      # Validate project policy
      # ------------------------
      - name: Validate required project docs
        shell: bash
        run: |
          set -e

          if [ ! -f AGENTS.md ]; then
            echo "AGENTS.md is required by repository policy."
            exit 1
          fi

          if [ ! -f README.md ]; then
            echo "README.md is required."
            exit 1
          fi

          if ! grep -qi "OmniVoice AI" AGENTS.md; then
            echo "AGENTS.md must reference OmniVoice AI."
            exit 1
          fi

      - name: Validate .env.example guidance
        shell: bash
        run: |
          if [ -f .env.example ]; then
            echo ".env.example found"
          else
            echo "::warning::.env.example not found. Recommended to document env variables."
          fi

      # ------------------------
      # Install Python dependencies (if exists)
      # ------------------------
      - name: Install Python dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip

          installed=0

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
            installed=1
          fi

          if [ -f backend/requirements.txt ]; then
            pip install -r backend/requirements.txt
            installed=1
          fi

          if [ -f pyproject.toml ]; then
            pip install .
            installed=1
          fi

          if [ -f backend/pyproject.toml ]; then
            pip install -e backend
            installed=1
          fi

          pip install pytest pytest-cov || true

          if [ "$installed" -eq 0 ]; then
            echo "No Python dependency manifest detected. Skipping install."
          fi

      # ------------------------
      # Install Node dependencies (if exists)
      # ------------------------
      - name: Install Node dependencies
        shell: bash
        run: |
          if [ -f package.json ]; then
            if [ -f pnpm-lock.yaml ]; then
              npm install -g pnpm
              pnpm install
            elif [ -f yarn.lock ]; then
              npm install -g yarn
              yarn install
            else
              npm install
            fi
          else
            echo "No Node project detected"
          fi

      # ------------------------
      # Run Python tests
      # ------------------------
      - name: Run Python tests
        shell: bash
        run: |
          if [ -d tests ]; then
            pytest -q || exit 1
          else
            echo "No Python tests found"
          fi

      # ------------------------
      # Run Node tests
      # ------------------------
      - name: Run Node tests
        shell: bash
        run: |
          if [ -f package.json ]; then
            npm test --if-present
          fi

      # ------------------------
      # Smoke check
      # ------------------------
      - name: Smoke check
        run: |
          echo "CI completed successfully for OmniVoice AI."
          if ! grep -qi "OmniVoice AI" AGENTS.md; then
            echo "AGENTS.md must reference OmniVoice AI."
            exit 1
          fi

      - name: Validate .env.example guidance
        shell: bash
        run: |
          set -euo pipefail
          if [ -f .env.example ]; then
            echo ".env.example found"
          else
            echo "::warning::.env.example not found. AGENTS.md recommends documenting environment variables in .env.example"
          fi

      - name: Install Python dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          installed=0

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
            installed=1
          fi

          if [ -f backend/requirements.txt ]; then
            pip install -r backend/requirements.txt
            installed=1
          fi

          if [ -f pyproject.toml ]; then
            pip install . || true
            installed=1
          fi

          if [ -f backend/pyproject.toml ]; then
            pip install -e backend || true
            installed=1
          fi

          pip install pytest pytest-cov

          if [ "$installed" -eq 0 ]; then
            echo "No Python dependency manifest detected. Skipping project dependency install."
          fi

      - name: Install Node dependencies (root)
        shell: bash
        run: |
          set -euo pipefail
          if [ -f package.json ]; then
            if [ -f package-lock.json ]; then
              npm ci
            elif [ -f pnpm-lock.yaml ]; then
              pnpm install --frozen-lockfile
            elif [ -f yarn.lock ]; then
              yarn install --frozen-lockfile
            else
              npm install
            fi
          else
            echo "No root package.json detected."
          fi

      - name: Install Node dependencies (frontend)
        shell: bash
        run: |
          set -euo pipefail
          if [ -f frontend/package.json ]; then
            cd frontend
            if [ -f package-lock.json ]; then
              npm ci
            elif [ -f pnpm-lock.yaml ]; then
              pnpm install --frozen-lockfile
            elif [ -f yarn.lock ]; then
              yarn install --frozen-lockfile
            else
              npm install
            fi
          else
            echo "No frontend/package.json detected."
          fi

      - name: Lint and type-check root app
        shell: bash
        run: |
          set -euo pipefail
          if [ -f package.json ]; then
            npm run lint --if-present
            npm run typecheck --if-present
            npm run build --if-present
          fi

      - name: Lint and type-check frontend
        shell: bash
        run: |
          set -euo pipefail
          if [ -f frontend/package.json ]; then
            cd frontend
            npm run lint --if-present
            npm run typecheck --if-present
            npm run build --if-present
          fi

      - name: Python smoke check
        shell: bash
        run: |
          set -euo pipefail
          if [ -d backend ]; then
            python -m compileall backend
          else
            python -m compileall .
          fi

      - name: Run Python tests
        shell: bash
        run: |
          set -euo pipefail
          if compgen -G "tests/**/*.py" > /dev/null || [ -d tests ] || [ -d backend/tests ]; then
            pytest -q
          else
            echo "No Python tests detected."
          fi

      - name: Run conversation and regression scripts (root)
        shell: bash
        run: |
          set -euo pipefail
          if [ -f package.json ]; then
            npm run test --if-present
            npm run test:unit --if-present
            npm run test:integration --if-present
            npm run test:conversation --if-present
            npm run test:regression --if-present
          fi

      - name: Run frontend tests
        shell: bash
        run: |
          set -euo pipefail
          if [ -f frontend/package.json ]; then
            cd frontend
            npm test --if-present
            npm run test:unit --if-present
            npm run test:integration --if-present
            npm run test:conversation --if-present
            npm run test:regression --if-present
          fi

      - name: Summarize CI intent
        if: always()
        run: |
          cat <<'EOF' >> "$GITHUB_STEP_SUMMARY"
          ## OmniVoice AI CI checks
          This workflow is aligned with `AGENTS.md` and focuses on:
          - protecting critical business flows
          - encouraging tests for order lookup, lead creation, appointment booking, and human handoff
          - keeping docs and environment guidance present
          - supporting a mixed Python + Node.js codebase
          EOF
